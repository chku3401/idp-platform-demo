apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.service.namespace }}
  labels:
    app: {{ .Values.service.name }}
    team: {{ .Values.service.team }}
spec:
  selector:
    app: {{ .Values.service.name }}
  ports:
    - port: 80
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
