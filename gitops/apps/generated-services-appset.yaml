apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: generated-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/chku3401/idp-platform-demo.git
        revision: main
        requeueAfterSeconds: 15
        files:
          - path: "generated/*/helm/values.yaml"
  template:
    metadata:
      name: '{{.service.name}}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/chku3401/idp-platform-demo.git
          targetRevision: main
          path: helm/service-chart
          helm:
            valueFiles:
              - $values/{{.path.path}}/values.yaml
        - repoURL: https://github.com/chku3401/idp-platform-demo.git
          targetRevision: main
          path: '{{.path.path}}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.service.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
