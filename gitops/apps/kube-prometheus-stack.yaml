apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.10.1
    helm:
      values: |
        alertmanager:
          enabled: false
        grafana:
          enabled: true
          defaultDashboardsEnabled: true
          adminPassword: idp-demo-admin
          service:
            type: ClusterIP
        prometheus:
          prometheusSpec:
            retention: 6h
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 800Mi
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
