service:
  name: automation-api
  team: auto
  namespace: auto-dev

image:
  repository: ghcr.io/chku3401/automation-api
  tag: 38b78b5cc95d6f4b372def3f258374708825b68b
  pullPolicy: IfNotPresent

replicaCount: 2

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
