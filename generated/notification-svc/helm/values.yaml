service:
  name: notification-svc
  team: notifications
  namespace: notifications-dev

image:
  repository: ghcr.io/chku3401/notification-svc
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  path: /health
  port: 8080

livenessProbe:
  path: /health
  port: 8080
