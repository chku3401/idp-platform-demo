name: docs-api CI

on:
  push:
    branches: [ main ]
    paths: [ 'generated/docs-api/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'generated/docs-api/**' ]

permissions:
  contents: write
  packages: write

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: generated/docs-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test

      - name: Build container image
        run: docker build -t ghcr.io/chku3401/docs-api:${{ github.sha }} .

      - name: Scan container image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/chku3401/docs-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        run: docker push ghcr.io/chku3401/docs-api:${{ github.sha }}

      - name: Bump Helm values to the new image tag
        if: github.event_name == 'push'
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" helm/values.yaml
          if ! git diff --quiet helm/values.yaml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add helm/values.yaml
            git commit -m "chore: bump docs-api image to ${{ github.sha }} [skip ci]"
            git push
          fi
